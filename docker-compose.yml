services:
  mongodb:
    image: mongo:latest
    container_name: movie-db-container
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: movie-api-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_MONGODB_URI=mongodb://mongodb:27017/moviedb
    depends_on:
      - mongodb

volumes:
  mongo-data: