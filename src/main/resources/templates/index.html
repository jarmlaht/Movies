<!DOCTYPE html>
<html lang="en" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Movie Collection</title>
    <!-- CSRF Meta Tags -->
    <meta name="_csrf" data-th-content="${_csrf.token}"/>
    <meta name="_csrf_header" data-th-content="${_csrf.headerName}"/>
    <style>
        :root {
            --page-background-color: #f4f4f9;
            --card-background-color: #ffffff;
            --primary-text-color: #333333;
            --secondary-text-color: #555555;
            --muted-text-color: #666666;
            --accent-color: #007bff;
            --card-shadow-color: rgba(0, 0, 0, 0.1);
            --modal-bg: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: var(--page-background-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-text-color);
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.9em;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .btn-icon-google {
            transform: scale(0.9);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--card-background-color);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px var(--card-shadow-color);
        }

        .movie-title {
            font-size: 1.2em;
            font-weight: bold;
            margin: 0 0 5px;
            color: var(--accent-color);
        }

        .movie-director {
            font-style: italic;
            color: var(--secondary-text-color);
            margin: 0 0 10px;
        }

        .movie-synopsis {
            color: var(--muted-text-color);
            line-height: 1.4;
            margin: 0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-bg);
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .modal-header {
            margin-bottom: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .error-message {
            color: #dc3545;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
<header>
    <h1>Movie Collection</h1>
    <div class="user-info">
        <div sec:authorize="isAuthenticated()">
            Logged in as: <span sec:authentication="name" style="font-weight: bold;">User</span>
            <form data-th-action="@{/logout}" method="post" style="display: inline; margin-left: 10px;">
                <button type="submit" class="btn btn-secondary">Logout</button>
            </form>
        </div>
        <div sec:authorize="isAnonymous()" style="display: flex; gap: 10px;">
            <a data-th-href="@{/oauth2/authorization/github}" class="btn btn-secondary" style="background-color: #24292e; color: white;">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                Login with GitHub
            </a>
            <a data-th-href="@{/oauth2/authorization/google}" class="btn btn-primary" style="background-color: #4285F4; color: white;">
                <svg class="btn-icon btn-icon-google" viewBox="0 0 48 48"><path d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
                Login with Google
            </a>
        </div>
    </div>
</header>

<main>
    <div data-th-if="${param.error}" class="error-message" style="text-align: center;">
        Authentication failed. Please try again.
    </div>

    <section class="movie-grid" aria-label="Movies">
        <article
                data-th-each="movie : ${movies}"
                data-th-with="directorFullName=${movie.director.firstName + ' ' + movie.director.lastName}"
                class="movie-card"
        >
            <h2 data-th-text="${movie.name}" class="movie-title">Movie Name</h2>

            <p class="movie-director">
                Directed by: <span data-th-text="${directorFullName}">Director Name</span>
            </p>

            <p data-th-text="${movie.synopsis}" class="movie-synopsis">Synopsis</p>
        </article>
    </section>
</main>

<!-- Access Denied Modal -->
<div id="accessDeniedModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" style="color: #dc3545;">Access Denied</div>
        <p>You must be logged in to access that page. Please log in to continue.</p>
        <div style="display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap;">
            <button type="button" class="btn btn-secondary" onclick="closeAccessDeniedModal()">Close</button>
            <a data-th-href="@{/oauth2/authorization/github}" class="btn btn-secondary" style="background-color: #24292e; color: white;">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                Login with GitHub
            </a>
            <a data-th-href="@{/oauth2/authorization/google}" class="btn btn-primary" style="background-color: #4285F4; color: white;">
                <svg class="btn-icon btn-icon-google" viewBox="0 0 48 48"><path d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
                Login with Google
            </a>
        </div>
    </div>
</div>

<script>
    function openAccessDeniedModal() {
        document.getElementById('accessDeniedModal').style.display = 'block';
    }

    function closeAccessDeniedModal() {
        document.getElementById('accessDeniedModal').style.display = 'none';
    }

    // Close modal when clicking outside it
    window.onclick = function(event) {
        let deniedModal = document.getElementById('accessDeniedModal');
        if (event.target === deniedModal) {
            closeAccessDeniedModal();
        }
    }

    // Automatically open modal if parameters are present
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('login_required')) {
            openAccessDeniedModal();
        }
    }
</script>
</body>
</html>
